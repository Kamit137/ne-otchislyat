<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/register.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="section-conatiner__list">
        <div class="container-logo">
            <h4>ne-otchislyat.ru</h4>
        </div>
        <div class="container-list">
            <div id="header-list-prof" class="header-list">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    fill="#3071E7">
                    <path
                        d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z" />
                </svg>
                <span>На главную</span>

            </div>

        </div>
    </div>
    <div class="background">
        <div class="menu-block">
            <div class="animation-login-hidden">
                <div class="login-container">
                    <form class="form-login" action="">
                        <h1 class="form-text">Вход</h1>
                        <input class="form-login__data" id="email-log" type="email" placeholder="Email">
                        <input class="form-login__data" id="password-log" type="password" placeholder="Password">
                        <button type="submit" class="btn-login">Отправить</button>
                    </form>
                </div>
            </div>
            <div class="animation-register-hidden">
                <div class="register-container">
                    <form class="form-register" action="">
                        <h1 class="form-text">Регистрация</h1>
                        <input type="text" class="form-register__data" id="name" placeholder="Name">
                        <input class="form-register__data" id="email-reg" type="email" placeholder="Email">
                        <input class="form-register__data" id="password-reg" type="password" placeholder="Password">
                        <button type="submit" class="btn-register">Отправить</button>
                    </form>
                </div>
            </div>
            <div class="front-container-animation-left">
                <div class="container-animation-left">
                    <div class="text-animation-login">
                        <h1 class="text-prewie">С возвращением<br>
                            в сообщество</h1>
                        <button id="login" class="btn">Login</button>
                    </div>
                </div>
            </div>
            <div class="front-container-animation-right">
                <div class="container-animation-right">
                    <div class="text-animation-register">
                        <h1 class="text-prewie">Станьте частью<br>
                            нашего сообщества</h1>
                        <button id="register" class="btn" type="button">Register</button>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const registerBtn = document.querySelector('#register');
        const loginBtn = document.querySelector('#login');
        const loginContainer = document.querySelector('.login-container')
        const registerContainer = document.querySelector('.register-container')
        const fontLeft = document.querySelector('.container-animation-left')
        const fontRight = document.querySelector('.container-animation-right')
        const textAnimationLogin = document.querySelector('.text-animation-login')
        const textAnimationRegister = document.querySelector('.text-animation-register')

        registerBtn.addEventListener("click", () => {
            fontRight.classList.add("right-panel-active");
            fontLeft.classList.add("left-panel-active")
            loginContainer.classList.add("login-hidden")
            registerContainer.classList.add("register-hidden")
            textAnimationRegister.classList.add("text-a-r")
            textAnimationLogin.classList.add("text-a-l")
            loginContainer.style.zIndex = "1";
            registerContainer.style.zIndex = "1";



        });
        loginBtn.addEventListener("click", () => {
            fontRight.classList.remove("right-panel-active");
            loginContainer.classList.remove("login-hidden")
            registerContainer.classList.remove("register-hidden")
            fontLeft.classList.remove("left-panel-active");
            textAnimationRegister.classList.remove("text-a-r")
            textAnimationLogin.classList.remove("text-a-l")
            loginContainer.style.zIndex = "1";
            registerContainer.style.zIndex = "1";




        })

        // РЕГИСТРАЦИЯ
        const formPostRegister = document.querySelector('.form-register'); // 👈 ДОБАВИЛ ТОЧКУ!
        formPostRegister.addEventListener('submit', (event) => {
            event.preventDefault();

            const name = document.querySelector('#name');
            const login = document.querySelector('#email-reg');
            const password = document.querySelector('#password-reg');

            if (login.value.trim() === '') {
                alert('Введите email');
                return;
            }

            const registerData = {
                name: name.value,
                email: login.value,
                password: password.value
            };

            fetch('http://localhost:8080/reg', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(registerData)
            })
                .then(response => {
                    // Пытаемся получить JSON в любом случае
                    return response.json().then(data => ({
                        status: response.status,
                        ok: response.ok,
                        body: data
                    }));
                })
                .then(({ status, ok, body }) => {
                    console.log('Ответ:', status, body);

                    // Если есть редирект - переходим (даже при ошибках)
                    if (body.redirect) {
                        console.log('Переходим на:', body.redirect);
                        window.location.href = body.redirect;
                        return;
                    }

                    // Если статус не 2xx, но нет редиректа - показываем ошибку
                    if (!ok) {
                        alert('Ошибка: ' + (body.message || 'Неизвестная ошибка'));
                        return;
                    }

                    // Успех
                    alert(body.message || 'Регистрация успешна!');
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    alert('Ошибка регистрации: ' + error.message);
                });
        });

        // ВХОД
        const formPostLogin = document.querySelector('.form-login');
        formPostLogin.addEventListener('submit', (event) => {
            event.preventDefault();

            const login = document.querySelector('#email-log');
            const password = document.querySelector('#password-log');

            const loginData = {
                email: login.value,
                password: password.value
            };

            fetch('http://localhost:8080/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            })
                .then(response => {
                    return response.json().then(data => ({
                        status: response.status,
                        ok: response.ok,
                        body: data
                    }));
                })
                .then(({ status, ok, body }) => {
                    console.log('Ответ:', status, body);

                    // РЕДИРЕКТ - ВАЖНО!
                    if (body.redirect) {
                        console.log('Переходим на:', body.redirect);
                        window.location.href = body.redirect;
                        return;
                    }

                    if (!ok) {
                        alert('Ошибка: ' + (body.message || 'Неизвестная ошибка'));
                        return;
                    }

                    alert(body.message || 'Вход выполнен!');
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    alert('Ошибка входа: ' + error.message);
                });
        });
        const textBtn = document.querySelector('.header-list')
        textBtn.addEventListener('click', () => {
            location.assign("/lenta");

        })
        const LogoBtn = document.querySelector('.container-logo')
        LogoBtn.addEventListener('click', () => {
            location.assign("/lenta");

        })
        // Для мобильной версии - таб-переключатель
        function initMobileTabs() {
            const isMobile = window.innerWidth <= 700;
            const menuBlock = document.querySelector('.menu-block');
            const loginContainer = document.querySelector('.login-container');
            const registerContainer = document.querySelector('.register-container');

            if (isMobile) {
                // Не пересоздаём если табы уже есть
                if (document.querySelector('.auth-tabs')) return;

                const tabsHtml = `
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
        `;
                menuBlock.insertAdjacentHTML('afterbegin', tabsHtml);

                loginContainer.classList.add('active');
                registerContainer.classList.remove('active');

                const tabs = document.querySelectorAll('.auth-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const target = tab.dataset.tab;
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');

                        if (target === 'login') {
                            loginContainer.classList.add('active');
                            registerContainer.classList.remove('active');
                        } else {
                            loginContainer.classList.remove('active');
                            registerContainer.classList.add('active');
                        }
                    });
                });
            }
        }

        // Заменяем старый resize-обработчик на умный
        let lastIsMobile = window.innerWidth <= 700;

        window.addEventListener('load', initMobileTabs);

        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth <= 700;

            // Пересоздаём табы ТОЛЬКО если сменился режим (мобильный ↔ десктоп)
            if (isMobile !== lastIsMobile) {
                lastIsMobile = isMobile;
                const oldTabs = document.querySelector('.auth-tabs');
                if (oldTabs) oldTabs.remove();
                initMobileTabs();
            }
        });

    </script>
</body>

</html>
